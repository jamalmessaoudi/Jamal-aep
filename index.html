<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منشآت الري - ولاية جانت</title>


<style>
body{
margin:0;
font-family:Tahoma;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
}


header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
letter-spacing:1px;
}


.container{
max-width:1200px;
margin:auto;
padding:15px;
}


.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:20px;
}


select{
padding:10px;
border:none;
border-radius:8px;
outline:none;
}


.section{
margin-bottom:25px;
}


.zone-title{
font-size:18px;
border-right:5px solid #00ffd0;
padding-right:10px;
margin:10px 0;
font-weight:bold;
}


.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
margin:10px 0;
backdrop-filter:blur(10px);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}


.row{
display:flex;
flex-wrap:wrap;
gap:10px;
}


.item{
padding:8px 12px;
border-radius:10px;
background:rgba(255,255,255,0.05);
font-size:14px;
}


.badge{
padding:3px 8px;
border-radius:6px;
font-size:11px;
margin-right:5px;
}


.green{background:#00c853;}
.red{background:#d50000;}
.gray{background:#777;}


.small{
opacity:0.8;
font-size:12px;
}
</style>
</head>


<body>


<header>🚰 منشآت الري - ولاية جانت</header>


<div class="container">


<div class="filters">
<select id="zoneFilter">
<option value="all">كل المناطق</option>
<option value="وسط المدينة">وسط المدينة</option>
<option value="إهدجيرن">إهدجيرن</option>
<option value="التبكات">التبكات</option>
<option value="تين قدازن">تين قدازن</option>
<option value="تين تماشي">تين تماشي</option>
<option value="إهرير">إهرير</option>
<option value="تورست">تورست</option>
<option value="بذاهجرين">بذاهجرين</option>
<option value="تاشت">تاشت</option>
</select>
</div>


<div id="app"></div>


</div>


<script>


const data = [


/* وسط المدينة */
{
zone:"وسط المدينة",
tanks:[
{n:"خزان مرتفع 2000 م³",s:"green"},
{n:"خزان مرتفع 100 م³",s:"red"},
{n:"خزان مرتفع 100 م³",s:"red"},
{n:"خزان عادي 300 م³",s:"red"},
{n:"خزان عادي 250 م³",s:"red"}
],
wells:[
{n:"بئر سطحي 12 م",s:"green"},
{n:"بئر سطحي 12 م",s:"green"},
{n:"بئر سطحي 12 م",s:"green"}
]
},


/* إهدجيرن */
{
zone:"إهدجيرن",
tanks:[
{n:"خزان عادي 500 م³",s:"red"}
],
wells:[
{n:"بئر عميق 300 م",s:"green"},
{n:"بئر عميق 300 م",s:"green"},
{n:"بئر عميق 300 م",s:"red"},
{n:"بئر عميق 300 م",s:"red"},
{n:"بئر عميق 300 م",s:"red"}
]
},


/* التبكات */
{
zone:"التبكات",
tanks:[
{n:"خزان مرتفع 100 م³",s:"green"},
{n:"خزان مرتفع 200 م³",s:"green"}
],
wells:[
{n:"بئر سطحي 12 م",s:"red"},
{n:"بئر سطحي 12 م",s:"green"}
]
},


/* تين قدازن */
{
zone:"تين قدازن",
tanks:[{n:"خزان مرتفع 150 م³",s:"green"}],
wells:[{n:"بئر سطحي 12 م",s:"green"}]
},


/* تين تماشي */
{
zone:"تين تماشي",
tanks:[{n:"خزان مرتفع 100 م³",s:"green"}],
wells:[
{n:"بئر سطحي 12 م",s:"green"},
{n:"بئر سطحي 12 م",s:"green"},
{n:"بئر سطحي 12 م",s:"red"},
{n:"بئر سطحي 12 م",s:"red"},
{n:"بئر سطحي 12 م",s:"red"}
]
},


/* إهرير */
{
zone:"إهرير",
tanks:[
{n:"خزان عادي 300 م³",s:"green"},
{n:"خزان عادي 150 م³",s:"green"},
{n:"خزان عادي 150 م³",s:"red"}
],
wells:[
{n:"بئر عميق 120 م",s:"green"},
{n:"بئر سطحي 12 م",s:"green"},
{n:"بئر سطحي 12 م",s:"green"},
{n:"بئر سطحي 12 م",s:"red"},
{n:"بئر سطحي 12 م",s:"red"}
]
},


/* تورست */
{
zone:"تورست",
tanks:[{n:"خزان 50 م³",s:"green"}],
wells:[{n:"بئر سطحي 12 م",s:"green"}]
},


/* بذاهجرين */
{
zone:"بذاهجرين",
tanks:[],
wells:[{n:"بئر سطحي 10 م",s:"green"}]
},


/* تاشت */
{
zone:"تاشت",
tanks:[],
wells:[]
}


];


function render(){


const zone=document.getElementById("zoneFilter").value;
const app=document.getElementById("app");


app.innerHTML="";


data.forEach(d=>{


if(zone!=="all" && d.zone!==zone) return;


app.innerHTML+=`
<div class="section">


<div class="zone-title">📍 ${d.zone}</div>


<div class="card">
<strong>🏗️ الخزانات</strong>
<div class="row">
${d.tanks.length?
d.tanks.map(t=>`
<div class="item">
<span class="badge ${t.s}"></span>
${t.n}
</div>
`).join("")
:"<div class='small'>لا توجد خزانات</div>"}
</div>
</div>


<div class="card">
<strong>💧 الآبار</strong>
<div class="row">
${d.wells.length?
d.wells.map(w=>`
<div class="item">
<span class="badge ${w.s}"></span>
${w.n}
</div>
`).join("")
:"<div class='small'>لا توجد آبار</div>"}
</div>
</div>


</div>
`;
});
}


document.getElementById("zoneFilter").onchange=render;


render();


</script>


</body>
</html>
