<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>لوحة الري</title>

<style>
:root {
    --bg: linear-gradient(135deg, #0f172a, #1e293b);
    --card: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.1);
    --primary: #3b82f6;
    --text: #f1f5f9;
}


* {
    box-sizing: border-box;
    transition: 0.3s;
}


body {
    margin: 0;
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
}


/* Sidebar */
aside {
    width: 250px;
    height: 100vh;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(15px);
    border-left: 1px solid var(--border);
    padding: 20px;
    position: fixed;
}


.logo {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 40px;
    color: var(--primary);
}


.nav-link {
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    gap: 10px;
}
