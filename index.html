<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منشآت الري - ولاية جانت</title>


<style>
body{
margin:0;
font-family:Tahoma;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
}


header{
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
}


.container{
max-width:1000px;
margin:auto;
padding:15px;
}


.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
margin:10px 0;
backdrop-filter:blur(10px);
cursor:pointer;
transition:0.2s;
}


.card:hover{transform:scale(1.02);}


.title{font-size:18px;font-weight:bold;}


.badge{
padding:3px 8px;
border-radius:6px;
font-size:11px;
margin-right:5px;
}


.green{background:#00c853;}
.red{background:#d50000;}
.yellow{background:#ffb300;color:#000;}


.btn{
background:#ff9800;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
margin-bottom:10px;
color:#fff;
}


h3{margin:10px 0;}


</style>
</head>


<body>


<header>🚰 منشآت الري - ولاية جانت</header>


<div class="container" id="app"></div>


<script>


const data = {
"برج الحواس":[
{
zone:"وسط المدينة",
tanks:{
"مرتفع":[
{n:"2000 م³",s:"green"},
{n:"100 م³",s:"red"},
{n:"100 م³",s:"red"}
],
"عادي":[
{n:"300 م³",s:"red"},
{n:"250 م³",s:"red"}
]
},
wells:{
"سطحي":[
{n:"12 م",s:"green"},
{n:"12 م",s:"green"},
{n:"12 م",s:"green"}
],
"عميق":[]
}
},


{
zone:"إهدجيرن",
tanks:{
"مرتفع":[],
"عادي":[{n:"500 م³",s:"red"}]
},
wells:{
"سطحي":[],
"عميق":[
{n:"300 م",s:"green"},
{n:"300 م",s:"green"},
{n:"300 م",s:"red"},
{n:"300 م",s:"red"},
{n:"300 م",s:"red"}
]
}
},


{
zone:"التبكات",
tanks:{
"مرتفع":[
{n:"100 م³",s:"green"},
{n:"200 م³",s:"green"}
],
"عادي":[]
},
wells:{
"سطحي":[
{n:"12 م",s:"red"},
{n:"12 م",s:"green"}
],
"عميق":[]
}
},


{
zone:"تين قدازن",
tanks:{
"مرتفع":[{n:"150 م³",s:"green"}],
"عادي":[]
},
wells:{
"سطحي":[{n:"12 م",s:"green"}],
"عميق":[]
}
},


{
zone:"تين تماشي",
tanks:{
"مرتفع":[{n:"100 م³",s:"green"}],
"عادي":[]
},
wells:{
"سطحي":[
{n:"12 م",s:"green"},
{n:"12 م",s:"green"},
{n:"12 م",s:"red"},
{n:"12 م",s:"red"},
{n:"12 م",s:"red"}
],
"عميق":[]
}
},


{
zone:"إهرير",
tanks:{
"مرتفع":[],
"عادي":[
{n:"300 م³",s:"green"},
{n:"150 م³",s:"green"},
{n:"150 م³",s:"red"}
]
},
wells:{
"عميق":[{n:"120 م",s:"green"}],
"سطحي":[
{n:"12 م",s:"green"},
{n:"12 م",s:"green"},
{n:"12 م",s:"red"},
{n:"12 م",s:"red"}
]
}
},


{
zone:"تورست",
tanks:{
"مرتفع":[],
"عادي":[{n:"50 م³",s:"green"}]
},
wells:{
"سطحي":[{n:"12 م",s:"green"}],
"عميق":[]
}
},


{
zone:"بذاهجرين",
tanks:{
"مرتفع":[],
"عادي":[]
},
wells:{
"سطحي":[{n:"10 م",s:"green"}],
"عميق":[]
}
},


{
zone:"تاشت",
tanks:{},
wells:{}
}
];


// ================= NAVIGATION =================
let view="communes";
let selectedZone="";


function render(){


let app=document.getElementById("app");
app.innerHTML="";


// ---------------- COMMUNES ----------------
if(view==="communes"){


app.innerHTML+=`
<div class="card" onclick="openZones()">
<div class="title">🏢 بلدية برج الحواس</div>
اضغط للدخول إلى المناطق
</div>


<div class="card">
<div class="title">🏢 بلدية جانت</div>
<div style="color:#ffeb3b">لا توجد منشآت (فارغة)</div>
</div>
`;
}


// ---------------- ZONES ----------------
else if(view==="zones"){


app.innerHTML+=`<button class="btn" onclick="back()">⬅ رجوع</button>`;


data["برج الحواس"].forEach(z=>{
app.innerHTML+=`
<div class="card" onclick="openZone('${z.zone}')">
📍 ${z.zone}
</div>
`;
});
}


// ---------------- DETAILS ----------------
else if(view==="zone"){


let z=data["برج الحواس"].find(x=>x.zone===selectedZone);


app.innerHTML+=`<button class="btn" onclick="back()">⬅ رجوع</button>`;
app.innerHTML+=`<h2>📍 ${selectedZone}</h2>`;


// -------- TANKS --------
app.innerHTML+=`<div class="card"><h3>🏗️ الخزانات</h3>`;


for(let type in z.tanks){
app.innerHTML+=`<h4>🔹 ${type}</h4>`;


(z.tanks[type]||[]).forEach(t=>{
app.innerHTML+=`
<div>${t.n}
<span class="badge ${t.s}">
${t.s==="green"?"يشتغل":"متوقف"}
</span>
</div>
`;
});
}


app.innerHTML+=`</div>`;


// -------- WELLS --------
app.innerHTML+=`<div class="card"><h3>💧 الآبار</h3>`;


for(let type in z.wells){
app.innerHTML+=`<h4>🔹 ${type}</h4>`;


(z.wells[type]||[]).forEach(w=>{
app.innerHTML+=`
<div>${w.n}
<span class="badge ${w.s}">
${w.s==="green"?"يشتغل":"متوقف"}
</span>
</div>
`;
});
}


app.innerHTML+=`</div>`;
}


}


function openZones(){
view="zones";
render();
}


function openZone(z){
selectedZone=z;
view="zone";
render();
}


function back(){
if(view==="zone") view="zones";
else view="communes";
render();
}


render();


</script>


</body>
</html>
